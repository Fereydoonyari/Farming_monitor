<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Farming Monitor - Login</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="authShell">
      <aside class="authBrand">
        <h1 class="authBrandTitle">Farming Monitor</h1>
        <p class="authBrandText">
          Simple farming management dashboard
        </p>
      </aside>

      <main class="authMain">
        <div class="authGrid">
          <section class="card">
            <div class="cardHead">
              <h2>Create account</h2>
              <p class="muted">Register as a farmer</p>
            </div>
            <form id="registerForm" class="form">
              <label>
                Name
                <input name="name" autocomplete="name" required />
              </label>
              <label>
                Email
                <input name="email" type="email" autocomplete="email" required />
              </label>
              <label>
                Password
                <input name="password" type="password" minlength="6" autocomplete="new-password" required />
              </label>
              <button type="submit" class="btn">Register</button>
            </form>
          </section>

          <section class="card">
            <div class="cardHead">
              <h2>Login</h2>
            </div>
            <form id="loginForm" class="form">
              <label>
                Email
                <input name="email" type="email" autocomplete="email" required />
              </label>
              <label>
                Password
                <input name="password" type="password" autocomplete="current-password" required />
              </label>
              <button type="submit" class="btn">Login</button>
              <p id="loginError" class="errorText" style="margin: 0"></p>
            </form>
            
          </section>
        </div>

      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
